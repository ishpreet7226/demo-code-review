name: AI Code Review
on: [pull_request]
jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      # This points to the 'main' branch of your custom code-reviewer repository!
      - uses: ishpreet7226/code-reviewer@main
        with:
          api-to-use: 'anthropic'
          anthropic-key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: 'claude-3-haiku-20240307'
          persona: 'kent_beck'
          style: 'concise'

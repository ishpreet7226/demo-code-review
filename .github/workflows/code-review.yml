name: AI Code Review
on: [pull_request]
jobs:
  code-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: fxchen/code-review@latest
        with:
          api-to-use: 'anthropic'
          anthropic-key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: 'claude-3-haiku-20240307' # Or whichever claude model you prefer
          persona: 'kent_beck'
          style: 'concise'
